<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Daraz</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f1f5;
    }

    .container {
      max-width: 450px;
      margin: 80px auto;
      background-color: white;
      padding: 40px 30px;
      border-radius: 5px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .form-group .forgot {
      float: right;
      font-size: 13px;
      margin-top: 5px;
      color: #1a9cb7;
      text-decoration: none;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background-color: #f57224;
      color: white;
      border: none;
      font-weight: bold;
      font-size: 15px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      font-size: 14px;
      color: #999;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: #ccc;
      position: absolute;
      top: 50%;
      width: 40%;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .social-login {
      display: flex;
      justify-content: space-between;
      gap: 15px;
    }

    .social-login button {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .top-bar {
      text-align: center;
      padding: 20px;
    }

    .top-bar span {
      font-size: 18px;
    }

    .top-bar a {
      float: right;
      font-size: 14px;
      margin-right: 30px;
      text-decoration: none;
      color: #1a9cb7;
    }

    @media (max-width: 500px) {
      .container {
        margin: 40px 20px;
        padding: 30px 20px;
      }

      .social-login {
        flex-direction: column;
      }

      .top-bar span,
      .top-bar a {
        float: none;
        display: block;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <span>Welcome to Daraz! Please login.</span>
    <a href="#">New member? <strong>Register here.</strong></a>
  </div>

  <div class="container">
    <h2>Login with Password</h2>
    
    <div class="form-group">
      <label for="email">Phone Number or Email*</label>
      <input type="text" id="email" placeholder="Please enter your Phone Number or Email" />
    </div>

    <div class="form-group">
      <label for="password">Password*</label>
      <input type="password" id="password" placeholder="Please enter your password" />
      <a href="#" class="forgot">Forgot Password?</a>
    </div>

    <button class="login-btn">LOGIN</button>

    <div class="divider">Or, login with</div>

    <div class="social-login">
      <button><i class="fab fa-facebook-f"></i> Facebook</button>
      <button><i class="fab fa-google"></i> Google</button>
    </div>
  </div>
</body>
</html>
